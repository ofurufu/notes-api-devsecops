name: 'Setup Node Project'
description: 'Sets up Node.js with caching and runs npm ci. Requires checkout to have already run.'

inputs:
  node-version:
    description: 'The Node.js version to install'
    required: false
    default: '20'

outputs:
  node-version-used:
    description: 'The Node.js version that was installed'
    value: ${{ steps.setup.outputs.node-version }}

runs:
  using: 'composite'
  steps:

    # Checkout is intentionally NOT here.
    # The caller must run actions/checkout BEFORE using this action.
    # Reason: GitHub cannot load a local action file from an unchecked-out repo.

    - name: Install Node.js ${{ inputs.node-version }}
      id: setup
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies (npm ci)
      run: npm ci
      shell: bash