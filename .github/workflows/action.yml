name: 'Setup Node Project'
description: 'Checks out the repo, sets up Node.js with caching, and runs npm ci'

inputs:
  node-version:
    description: 'The Node.js version to install'
    required: false
    default: '20'

outputs:
  node-version-used:
    description: 'The Node.js version that was installed'
    value: ${{ steps.setup.outputs.node-version }}

runs:
  using: 'composite'
  steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Node.js ${{ inputs.node-version }}
      id: setup
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      shell: bash