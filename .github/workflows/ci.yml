# .github/workflows/ci.yml
#
# Main CI Entry Point — Updated in Phase 3
#
# Change from Phase 2:
#   Added 'security-events: write' permission so the security-scan
#   job in reusable-ci.yml can upload SARIF results to GitHub.
#
# Triggered on:
#   - Push to main (catches direct commits and merged PRs)
#   - Pull request targeting main (the merge gate)
#   - Manual trigger from GitHub Actions UI

name: CI

# ─── Triggers ─────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package*.json'
      - 'Dockerfile'
      - '.trivyignore'          # Re-run if suppressions change
      - '.github/workflows/**'
      - '.github/actions/**'

  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package*.json'
      - 'Dockerfile'
      - '.trivyignore'
      - '.github/workflows/**'
      - '.github/actions/**'

  workflow_dispatch:
    inputs:
      node-versions:
        description: 'Node.js versions to test (JSON array)'
        required: false
        default: '["20", "22"]'

# ─── Permissions ──────────────────────────────────────────────────────────────
# Updated in Phase 3: added security-events: write.
#
# Why here AND in reusable-ci.yml?
#   - ci.yml (caller) must GRANT the permission budget
#   - reusable-ci.yml (callee) must DECLARE it uses the permission
#   Both are required. One without the other doesn't work.
#
# Why not just set permissions: write-all here?
#   - That would grant every permission to every job.
#   - If a step is compromised, it has maximum blast radius.
#   - Declaring specific permissions limits what an attacker can do.

permissions:
  contents: read            # Clone the repo
  security-events: write    # Upload SARIF to GitHub Security tab

# ─── Concurrency ──────────────────────────────────────────────────────────────

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ─── Jobs ─────────────────────────────────────────────────────────────────────

jobs:
  ci:
    name: 'CI Pipeline'
    uses: ./.github/workflows/reusable-ci.yml
    with:
      node-version-matrix: ${{ github.event.inputs.node-versions || '["20", "22"]' }}
      node-version-lint: '20'
      run-coverage: true
      audit-level: 'high'    # Fail CI on High or Critical vulnerabilities
    # No secrets block needed — reusable-ci.yml doesn't require secrets